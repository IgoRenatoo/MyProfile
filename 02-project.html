<!DOCTYPE html>
<html lang="pr-br" class="root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects</title>

  <style>

    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }

    :root {
      --bkground: url(./CSS/assets/index/blackmood.jpg) no-repeat top center/cover;
      --border-color: white;
      --text-color: rgba(0, 255, 255, 0.908);
      --background-color: rgba(255, 255, 255, 0.10);
      --background-color-hover: rgba(255, 255, 255, 0.50);
      --switch-filter: url(./assets/index/sun.svg);
    }

    body {
      background: var(--bkground);
      height: 100vh;
    }
    
    section {
      margin: auto;
    }

    div {
      flex-direction: column;
      
    }
    
    #bt {
      display: flex;
      background-color: var(--background-color);
      justify-content: center;
      margin: 20px auto;
      border-radius: 10px;
      border: solid 1pt var(--border-color);
      padding: 20px 100px;
      font-size: 18px;
      text-decoration: none;
      color: var(--text-color);
    }
    #bt:hover {
      background-color: var(--background-color-hover);
      border: 2px solid white;
      /* border: solid white; */
    }

    div a {
      text-decoration: none;
    }

    #vlt {
      display: flex;
      margin: auto;
      padding: 20px 60px;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      border: solid 1pt var(--border-color);
      background: var(--background-color);
      width: 80px;
      height: 30px;
      color: var(--text-color);
    }

    #vlt:hover {
      background: var(--background-color-hover);
      border: 2px solid white;
    }

    footer {
      color: var(--text-color);
      font-size: 18px;
      font-style: italic;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }


  </style>
</head>

      <a href="./02.2-idade.html" target="_parent"><input type="button" value="PROJETO IDADE" id="bt"></a>
    </div>

  </section>
